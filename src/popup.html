<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            font-size: 13px;
            width: 220px;
            padding: 12px 14px;
            color: #222;
        }
        h1 {
            font-size: 14px;
            margin: 0 0 6px;
            color: #0d9488;
        }
        p {
            margin: 0;
            color: #555;
            line-height: 1.5;
        }
        .badge {
            display: inline-block;
            margin-top: 10px;
            padding: 2px 8px;
            background: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            font-size: 11px;
            color: #166534;
        }
    </style>
</head>
<body>
    <h1>VFA Documentation Standards</h1>
    <p>Click the <strong>ⓘ</strong> icon next to any field on an EMSCharts page to view the documentation standard for that field.</p>
    <div class="badge">Active on this page</div>
</body>
</html>
