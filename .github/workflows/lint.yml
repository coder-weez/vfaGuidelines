name: Lint

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  web-ext-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # No lockfile is committed, so use `npm install` rather than `npm ci`.
      - name: Install dependencies
        run: npm install

      # Catches real bugs in the vanilla-DOM code (undeclared globals, unused
      # vars, typos in field-name maps).
      - name: Lint JavaScript (ESLint)
        run: npm run lint

      # Validates the manifest and flags structural issues in src/.
      # web-ext is Firefox tooling; Chrome-only manifest keys surface as
      # warnings (non-fatal) while real errors (bad manifest, missing files)
      # fail the job.
      - name: Lint extension (web-ext)
        run: npm run lint:ext
